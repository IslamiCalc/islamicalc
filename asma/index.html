function renderAsma(list) {
  document.getElementById('asmaGrid').innerHTML = list.map(a => `
    <div class="asma-card">
      <div class="asma-num">${a.id} / 99</div>
      <div class="asma-name">${a.name}</div>
      <div class="asma-meaning">${a.meaning}</div>
      <div class="asma-source">📖 ${a.source}</div>
    </div>`).join('');
  const n = list.length;
  document.getElementById('countBadge').textContent = n === 99 ? '99 اسماً' : `${n} نتيجة`;
}

function filterAsma(q) {
  if (!q.trim()) { renderAsma(ASMA_ALLAH); return; }
  const s = q.trim();
  renderAsma(ASMA_ALLAH.filter(a =>
    a.name.includes(s) || a.meaning.includes(s) || a.source.includes(s)
  ));
}

renderAsma(ASMA_ALLAH);
</script>
