    .seerah-hero {

      position: relative;
      overflow: hidden;
    }
    .seerah-hero::before {
      content: '';

      background:

    .hero-badge {

      margin-bottom: 20px; position: relative;
    }
    .seerah-hero h1 {

      font-weight: 900; line-height: 1.3;
      margin-bottom: 12px; position: relative;
    }
    .gradient-text {
      background: linear-gradient(135deg, var(--primary-light), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .seerah-hero p {
      font-size: 15px; color: var(--text-sub);
      max-width: 540px; margin: 0 auto 28px; position: relative;
    }
    .hero-stats {
      display: flex; justify-content: center;

    .hero-stat-lbl { font-size: 12px; color: var(--text-muted); }
    .tabs-bar {
      display: flex; gap: 4px; flex-wrap: wrap;
      justify-content: center;
      max-width: 960px; margin: 32px auto 0;
      padding: 0 24px;
    }
    .tab-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 9px 18px;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 999px; color: var(--text-sub);
      font-family: var(--font); font-size: 13px; font-weight: 700;
      cursor: pointer; transition: var(--transition);
      white-space: nowrap;
    }
    .tab-btn svg { width: 14px; height: 14px; }
    .tab-btn:hover, .tab-btn.active {
      background: rgba(45,106,79,0.15);
      border-color: var(--primary);
      color: var(--primary-light);
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .seerah-wrap {
      max-width: 900px; margin: 40px auto 80px;
      padding: 0 24px;
    }
    .phase-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      margin-bottom: 16px;
      overflow: hidden;
      transition: var(--transition);
    }
    .phase-header {
      display: flex; align-items: center; gap: 16px;
      padding: 20px 24px;
      cursor: pointer;
      user-select: none;
    }
    .phase-header:hover { background: var(--bg-card-hover); }
    .phase-num {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--primary), var(--gold));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 900; color: #fff;
      flex-shrink: 0;
    }
    .phase-info { flex: 1; }
    .phase-title { font-size: 18px; font-weight: 800; margin-bottom: 3px; }
    .phase-meta  { font-size: 12px; color: var(--gold); font-weight: 600; }
    .phase-arrow { color: var(--text-muted); transition: transform 0.3s; }
    .phase-arrow svg { width: 18px; height: 18px; }
    .phase-card.open .phase-arrow { transform: rotate(180deg); }
    .phase-body {
      padding: 0 24px;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease, padding 0.3s;
    }
    .phase-card.open .phase-body {
      padding: 0 24px 24px;
      max-height: 2000px;
    }
    .event-list { display: flex; flex-direction: column; gap: 12px; margin-top: 4px; }
    .event-item {
      display: flex; gap: 14px; align-items: flex-start;
      background: rgba(45,106,79,0.05);
      border-radius: 12px; padding: 14px;
      border: 1px solid rgba(45,106,79,0.1);
    }
    .event-icon {
      width: 36px; height: 36px;
      background: rgba(201,168,76,0.1);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;

    .event-date  { font-size: 11px; color: var(--gold); font-weight: 700; margin-bottom: 6px; }
    .event-desc  { font-size: 13.5px; color: var(--text-sub); line-height: 1.8; }
    .seerah-verse {
      background: rgba(201,168,76,0.07);
      border-right: 3px solid var(--gold);
      border-radius: 0 10px 10px 0;
      padding: 12px 16px; margin: 12px 0;
      font-size: 15px; font-weight: 700; color: var(--gold);
      line-height: 2;
    }
    .seerah-verse span { font-size: 12px; color: var(--text-muted); font-weight: 400; display: block; margin-top: 4px; }
    .phase-lesson {
      background: rgba(45,106,79,0.08);
      border-radius: 12px; padding: 14px 16px;
      margin-top: 14px; font-size: 14px;
      color: var(--text-sub); line-height: 1.8;
      border: 1px solid rgba(45,106,79,0.15);
      display: flex; gap: 10px; align-items: flex-start;
    }
    .phase-lesson::before { content: '💡'; flex-shrink: 0; }
    .timeline-wrap {
      max-width: 760px; margin: 40px auto 80px;
      padding: 0 24px;
    }
    .tl-item { display: flex; gap: 16px; margin-bottom: 24px; position: relative; }
    .tl-left { display: flex; flex-direction: column; align-items: center; gap: 0; }
    .tl-dot {
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--gold);
      border: 3px solid var(--bg-main);
      box-shadow: 0 0 0 2px var(--gold);
      flex-shrink: 0; margin-top: 4px;
    }
    .tl-dot.green { background: var(--primary-light); box-shadow: 0 0 0 2px var(--primary-light); }
    .tl-line {
      width: 2px; flex: 1;
      background: linear-gradient(180deg, var(--gold), var(--primary));
      opacity: 0.2; min-height: 20px;
    }
    .tl-content { flex: 1; padding-bottom: 8px; }
    .tl-year { font-size: 11px; font-weight: 800; color: var(--gold); margin-bottom: 4px; }
    .tl-title { font-size: 15px; font-weight: 800; margin-bottom: 4px; }
    .tl-desc  { font-size: 13px; color: var(--text-sub); line-height: 1.7; }
    .akhlaq-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px; margin-top: 8px;
    }
    .akhlaq-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px; padding: 18px;
      text-align: center; transition: var(--transition);
    }
    .akhlaq-card:hover { border-color: rgba(45,106,79,0.4); transform: translateY(-3px); }
    .akhlaq-icon { font-size: 2rem; display: block; margin-bottom: 10px; }
    .akhlaq-title { font-size: 15px; font-weight: 800; margin-bottom: 6px; }
    .akhlaq-desc { font-size: 13px; color: var(--text-sub); line-height: 1.7; }
    .akhlaq-hadith {
      font-size: 12px; color: var(--gold);
      margin-top: 10px; padding-top: 10px;
      border-top: 1px solid var(--border);
      font-style: italic;
    }
    .ghazwa-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px; padding: 20px;
      margin-bottom: 12px; cursor: pointer;
      transition: var(--transition);
    }
    .ghazwa-card:hover { border-color: rgba(45,106,79,0.4); transform: translateY(-2px); }
    .ghazwa-header { display: flex; align-items: center; gap: 14px; margin-bottom: 10px; }
    .ghazwa-num {
      background: linear-gradient(135deg, var(--primary), var(--gold));
      color: #fff; border-radius: 10px;
      padding: 6px 14px; font-size: 13px;
      font-weight: 800; flex-shrink: 0;
    }
    .ghazwa-title { font-size: 17px; font-weight: 800; }
    .ghazwa-year  { font-size: 12px; color: var(--gold); margin-bottom: 6px; }
    .ghazwa-desc  { font-size: 13.5px; color: var(--text-sub); line-height: 1.8; }
    .ghazwa-result {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 10px; padding: 5px 14px;
      border-radius: 999px; font-size: 12px; font-weight: 700;
    }
    .result-win  { background: rgba(63,185,80,0.1); color: #3fb950; border: 1px solid rgba(63,185,80,0.2); }
    .result-loss { background: rgba(248,81,73,0.1);  color: #f85149; border: 1px solid rgba(248,81,73,0.2); }
    .result-draw { background: rgba(201,168,76,0.1); color: var(--gold); border: 1px solid rgba(201,168,76,0.2); }
    @media (max-width: 640px) {
      .akhlaq-grid { grid-template-columns: 1fr 1fr; }
      .tabs-bar { gap: 6px; }
    }
  </style>
</head>

function switchTab(name, btn) {
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("panel-" + name).classList.add("active");
}

function buildPhases() {
  const wrap = document.getElementById("phasesContainer");
  wrap.innerHTML = PHASES.map((ph, i) => `
    <div class="phase-card" id="phase${i}">
      <div class="phase-header" onclick="togglePhase(${i})">
        <div class="phase-num">${ph.num}</div>
        <div class="phase-info">
          <div class="phase-title">${ph.title}</div>
          <div class="phase-meta">${ph.meta}</div>
        </div>
        <div class="phase-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
      <div class="phase-body">
        <div class="event-list">
          ${ph.events.map(ev => `
            <div class="event-item">
              <div class="event-icon">${ev.icon}</div>
              <div class="event-content">
                <div class="event-title">${ev.title}</div>
                <div class="event-date">📅 ${ev.date}</div>
                <div class="event-desc">${ev.desc}</div>
              </div>
            </div>`).join("")}
        </div>
        <div class="seerah-verse">${ph.verse}<span>${ph.verseSource}</span></div>
        <div class="phase-lesson">${ph.lesson}</div>
      </div>
    </div>`).join("");
  togglePhase(0);
}

function togglePhase(i) {
  document.getElementById("phase" + i).classList.toggle("open");
}

function buildTimeline() {
  const wrap = document.getElementById("timelineContainer");
  wrap.innerHTML = TIMELINE.map((item, i) => `
    <div class="tl-item">
      <div class="tl-left">
        <div class="tl-dot ${item.dot === "green" ? "green" : ""}"></div>
        ${i < TIMELINE.length - 1 ? '<div class="tl-line"></div>' : ""}
      </div>
      <div class="tl-content">
        <div class="tl-year">${item.year}</div>
        <div class="tl-title">${item.title}</div>
        <div class="tl-desc">${item.desc}</div>
      </div>
    </div>`).join("");
}

// ===== Menu =====
const menuToggle  = document.getElementById("menuToggle");
const navMenu     = document.getElementById("navMenu");
const iconMenuEl  = document.getElementById("iconMenu");
const iconCloseEl = document.getElementById("iconClose");

menuToggle.addEventListener("click", () => {
  const open = navMenu.classList.toggle("open");
  menuToggle.setAttribute("aria-expanded", open);
  iconMenuEl.style.display  = open ? "none"  : "block";
  iconCloseEl.style.display = open ? "block" : "none";
});

document.addEventListener("click", (e) => {
  if (!menuToggle.contains(e.target) && !navMenu.contains(e.target)) {
    navMenu.classList.remove("open");
    iconMenuEl.style.display  = "block";
    iconCloseEl.style.display = "none";
  }
});

// ===== Firebase auth state =====
window.addEventListener("islamiCalcReady", () => {
  const user = window.islamiCalc?.getCurrentUser?.();
  if (user) {
    document.getElementById("loginBtn").style.display   = "none";
    document.getElementById("navProfile").style.display = "block";
  }
});
