  <style>
    /* ===== هيدر الصفحة ===== */
    .seerah-hero {
      background: linear-gradient(135deg, #0d1117 0%, #0d1a0d 40%, #1a1209 100%);
      padding: 96px 24px 56px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .seerah-hero::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 50% 0%, rgba(45,106,79,0.18) 0%, transparent 65%),
        radial-gradient(ellipse 40% 30% at 80% 80%, rgba(201,168,76,0.08) 0%, transparent 60%);
      pointer-events: none;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(201,168,76,0.1);
      border: 1px solid rgba(201,168,76,0.25);
      color: var(--gold);
      padding: 6px 18px; border-radius: 999px;
      font-size: 13px; font-weight: 600;
      margin-bottom: 20px; position: relative;
    }
    .seerah-hero h1 {
      font-size: clamp(30px,5vw,52px);
      font-weight: 900; line-height: 1.3;
      margin-bottom: 12px; position: relative;
    }
    .gradient-text {
      background: linear-gradient(135deg, var(--primary-light), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .seerah-hero p {
      font-size: 15px; color: var(--text-sub);
      max-width: 540px; margin: 0 auto 28px; position: relative;
    }
    .hero-stats {
      display: flex; justify-content: center;
      gap: 36px; flex-wrap: wrap; position: relative;
    }
    .hero-stat-num { font-size: 1.9rem; font-weight: 900; color: var(--gold); display: block; }
    .hero-stat-lbl { font-size: 12px; color: var(--text-muted); }

    /* ===== التبويبات ===== */
    .tabs-bar {
      display: flex; gap: 4px; flex-wrap: wrap;
      justify-content: center;
      max-width: 960px; margin: 32px auto 0;
      padding: 0 24px;
    }
    .tab-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 9px 18px;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 999px; color: var(--text-sub);
      font-family: var(--font); font-size: 13px; font-weight: 700;
      cursor: pointer; transition: var(--transition);
      white-space: nowrap;
    }
    .tab-btn svg { width: 14px; height: 14px; }
    .tab-btn:hover, .tab-btn.active {
      background: rgba(45,106,79,0.15);
      border-color: var(--primary);
      color: var(--primary-light);
    }

    /* ===== المحتوى ===== */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .seerah-wrap {
      max-width: 900px; margin: 40px auto 80px;
      padding: 0 24px;
    }

    /* ===== بطاقة المرحلة ===== */
    .phase-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      margin-bottom: 16px;
      overflow: hidden;
      transition: var(--transition);
    }
    .phase-header {
      display: flex; align-items: center; gap: 16px;
      padding: 20px 24px;
      cursor: pointer;
      user-select: none;
    }
    .phase-header:hover { background: var(--bg-card-hover); }

    .phase-num {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--primary), var(--gold));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 900; color: #fff;
      flex-shrink: 0;
    }
    .phase-info { flex: 1; }
    .phase-title { font-size: 18px; font-weight: 800; margin-bottom: 3px; }
    .phase-meta  { font-size: 12px; color: var(--gold); font-weight: 600; }
    .phase-arrow {
      color: var(--text-muted);
      transition: transform 0.3s;
    }
    .phase-arrow svg { width: 18px; height: 18px; }
    .phase-card.open .phase-arrow { transform: rotate(180deg); }

    .phase-body {
      padding: 0 24px;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease, padding 0.3s;
    }
    .phase-card.open .phase-body {
      padding: 0 24px 24px;
      max-height: 2000px;
    }

    /* ===== الأحداث داخل المرحلة ===== */
    .event-list { display: flex; flex-direction: column; gap: 12px; margin-top: 4px; }

    .event-item {
      display: flex; gap: 14px; align-items: flex-start;
      background: rgba(45,106,79,0.05);
      border-radius: 12px; padding: 14px;
      border: 1px solid rgba(45,106,79,0.1);
    }
    .event-icon {
      width: 36px; height: 36px;
      background: rgba(201,168,76,0.1);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .event-content { flex: 1; }
    .event-title { font-size: 15px; font-weight: 800; margin-bottom: 4px; }
    .event-date  { font-size: 11px; color: var(--gold); font-weight: 700; margin-bottom: 6px; }
    .event-desc  { font-size: 13.5px; color: var(--text-sub); line-height: 1.8; }

    /* ===== آية أو حديث ===== */
    .seerah-verse {
      background: rgba(201,168,76,0.07);
      border-right: 3px solid var(--gold);
      border-radius: 0 10px 10px 0;
      padding: 12px 16px; margin: 12px 0;
      font-size: 15px; font-weight: 700; color: var(--gold);
      line-height: 2;
    }
    .seerah-verse span { font-size: 12px; color: var(--text-muted); font-weight: 400; display: block; margin-top: 4px; }

    /* ===== الدرس ===== */
    .phase-lesson {
      background: rgba(45,106,79,0.08);
      border-radius: 12px; padding: 14px 16px;
      margin-top: 14px; font-size: 14px;
      color: var(--text-sub); line-height: 1.8;
      border: 1px solid rgba(45,106,79,0.15);
      display: flex; gap: 10px; align-items: flex-start;
    }
    .phase-lesson::before { content: '💡'; flex-shrink: 0; }

    /* ===== الخط الزمني ===== */
    .timeline-wrap {
      max-width: 760px; margin: 40px auto 80px;
      padding: 0 24px;
    }
    .tl-item {
      display: flex; gap: 16px;
      margin-bottom: 24px; position: relative;
    }
    .tl-left {
      display: flex; flex-direction: column;
      align-items: center; gap: 0;
    }
    .tl-dot {
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--gold);
      border: 3px solid var(--bg-main);
      box-shadow: 0 0 0 2px var(--gold);
      flex-shrink: 0; margin-top: 4px;
    }
    .tl-dot.green { background: var(--primary-light); box-shadow: 0 0 0 2px var(--primary-light); }
    .tl-line {
      width: 2px; flex: 1;
      background: linear-gradient(180deg, var(--gold), var(--primary));
      opacity: 0.2; min-height: 20px;
    }
    .tl-content { flex: 1; padding-bottom: 8px; }
    .tl-year {
      font-size: 11px; font-weight: 800;
      color: var(--gold); margin-bottom: 4px;
    }
    .tl-title { font-size: 15px; font-weight: 800; margin-bottom: 4px; }
    .tl-desc  { font-size: 13px; color: var(--text-sub); line-height: 1.7; }

    /* ===== أخلاق النبي ﷺ ===== */
    .akhlaq-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px; margin-top: 8px;
    }
    .akhlaq-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px; padding: 18px;
      text-align: center; transition: var(--transition);
    }
    .akhlaq-card:hover {
      border-color: rgba(45,106,79,0.4);
      transform: translateY(-3px);
    }
    .akhlaq-icon { font-size: 2rem; display: block; margin-bottom: 10px; }
    .akhlaq-title { font-size: 15px; font-weight: 800; margin-bottom: 6px; }
    .akhlaq-desc { font-size: 13px; color: var(--text-sub); line-height: 1.7; }
    .akhlaq-hadith {
      font-size: 12px; color: var(--gold);
      margin-top: 10px; padding-top: 10px;
      border-top: 1px solid var(--border);
      font-style: italic;
    }

    /* ===== غزوات ===== */
    .ghazwa-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px; padding: 20px;
      margin-bottom: 12px; cursor: pointer;
      transition: var(--transition);
    }
    .ghazwa-card:hover {
      border-color: rgba(45,106,79,0.4);
      transform: translateY(-2px);
    }
    .ghazwa-header {
      display: flex; align-items: center;
      gap: 14px; margin-bottom: 10px;
    }
    .ghazwa-num {
      background: linear-gradient(135deg, var(--primary), var(--gold));
      color: #fff; border-radius: 10px;
      padding: 6px 14px; font-size: 13px;
      font-weight: 800; flex-shrink: 0;
    }
    .ghazwa-title { font-size: 17px; font-weight: 800; }
    .ghazwa-year  { font-size: 12px; color: var(--gold); margin-bottom: 6px; }
    .ghazwa-desc  { font-size: 13.5px; color: var(--text-sub); line-height: 1.8; }
    .ghazwa-result {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 10px; padding: 5px 14px;
      border-radius: 999px; font-size: 12px; font-weight: 700;
    }
    .result-win  { background: rgba(63,185,80,0.1); color: #3fb950; border: 1px solid rgba(63,185,80,0.2); }
    .result-loss { background: rgba(248,81,73,0.1);  color: #f85149; border: 1px solid rgba(248,81,73,0.2); }
    .result-draw { background: rgba(201,168,76,0.1); color: var(--gold); border: 1px solid rgba(201,168,76,0.2); }

    @media (max-width: 640px) {
      .akhlaq-grid { grid-template-columns: 1fr 1fr; }
      .tabs-bar { gap: 6px; }
    }
  </style>
</head>

<script>
// ================================================================
// بيانات السيرة النبوية
// المصادر: الرحيق المختوم (المباركفوري)، ابن هشام، البداية والنهاية
// ================================================================

const PHASES = [
  {
    num: 1,
    title: "المولد والطفولة",
    meta: "53 ق.هـ — عام 570م",
    events: [
      {
        icon: "🌙",
        title: "المولد الشريف",
        date: "12 ربيع الأول — عام الفيل (~570م)",
        desc: "وُلد محمد ﷺ في مكة المكرمة بحي بني هاشم، يتيم الأب — توفي أبوه عبدالله قبل ولادته. تكفّل به جده عبدالمطلب. أُرسع للرضاعة عند حليمة السعدية في بادية بني سعد."
      },
      {
        icon: "✨",
        title: "شق الصدر الأول",
        date: "في سنوات الطفولة",
        desc: "جاء جبريل عليه السلام فشقّ صدره وأخرج منه حظ الشيطان وغسله بماء زمزم. خافت حليمة وأعادته لأمه. وقعت في سنوات متعددة — الثانية والعاشرة وليلة المعراج."
      },
      {
        icon: "🕊️",
        title: "وفاة أمه",
        date: "حين بلغ 6 سنوات",
        desc: "توفيت أمه آمنة بنت وهب في الأبواء بين مكة والمدينة وهي عائدة من زيارة أخوال أبيه بيثرب. كفله جده عبدالمطلب."
      },
      {
        icon: "❤️",
        title: "وفاة جده ثم كفالة عمه",
        date: "حين بلغ 8 سنوات",
        desc: "توفي جده عبدالمطلب وهو ابن 8 سنوات، فتكفّل به عمه أبو طالب — الذي حماه طيلة حياته ولم يسلم."
      }
    ],
    verse: "أَلَمْ يَجِدْكَ يَتِيمًا فَآوَىٰ",
    verseSource: "سورة الضحى — الآية 6",
    lesson: "اليتم والفقر والضعف في البداية لا يحدد مصير الإنسان — الله يختار رسله من المستضعفين ليكون الدين حجة على الجميع."
  },
  {
    num: 2,
    title: "الشباب والتجارة",
    meta: "من 12 إلى 40 سنة",
    events: [
      {
        icon: "🐑",
        title: "رعي الغنم",
        date: "مرحلة الصبا",
        desc: "رعى ﷺ الغنم في مكة لأهلها — وهي سنة الأنبياء. قال: 'ما من نبي إلا رعى الغنم'. كانت تربيةً على الصبر والتأمل."
      },
      {
        icon: "🤝",
        title: "حلف الفضول",
        date: "قبل النبوة بعشرين سنة",
        desc: "شارك في حلف الفضول — تحالف لنصرة المظلوم ومنع الظلم في مكة. قال ﷺ بعد الإسلام: 'لو دُعيت إليه لأجبت'."
      },
      {
        icon: "🏪",
        title: "التجارة مع خديجة",
        date: "قبل النبوة",
        desc: "عمل ﷺ في تجارة السيدة خديجة رضي الله عنها — لُقّب بالصادق الأمين. بعد عودته من الشام وحسن تجارته، خطبته خديجة وتزوجها وعمره 25 سنة وعمرها 40."
      },
      {
        icon: "🕋",
        title: "بناء الكعبة وتحكيم النبي ﷺ",
        date: "قبل النبوة بـ5 سنوات (~35 سنة)",
        desc: "حين أُعيد بناء الكعبة، اختلفت القبائل على من يضع الحجر الأسود. اتفقوا على أول داخل من الباب — فكان محمداً ﷺ. بسط رداءه ووضع الحجر فيه وأمسك كل قبيلة بطرف فرفعوه معاً — حكم عدل أرضى الجميع."
      }
    ],
    verse: "وَوَجَدَكَ عَائِلًا فَأَغْنَىٰ",
    verseSource: "سورة الضحى — الآية 8",
    lesson: "السيرة الحسنة والأمانة في التجارة والمعاملة — دعوة قبل الدعوة. بناء الثقة يسبق بناء الرسالة."
  },
  {
    num: 3,
    title: "نزول الوحي والدعوة السرية",
    meta: "40 — 43 سنة | 610 — 613م",
    events: [
      {
        icon: "🌄",
        title: "التحنث في غار حراء",
        date: "قبيل النبوة",
        desc: "كان ﷺ يتعبد في غار حراء أياماً يتأمل الكون ويتفكر. حتى جاءه الوحي."
      },
      {

  { icon:"😊", title:"البشاشة",      desc:"كان دائم البسمة. قال جرير: 'ما حجبني النبي ﷺ منذ أسلمت ولا رآني إلا تبسّم في وجهي'.", hadith:"'تبسّمك في وجه أخيك صدقة'" },
  { icon:"🤍", title:"الوفاء",       desc:"لم ينسَ معروف خديجة حتى بعد وفاتها. كان يُكرم صديقاتها ويهدي لهن.",            hadith:"'إني لأحب من كان يحبها'" },
  { icon:"💪", title:"الشجاعة",      desc:"أشجع الناس في الملاحم. كان إذا اشتدت المعركة احتمى الصحابة به ﷺ.",               hadith:"'كان ﷺ أشجع الناس'" },
  { icon:"🔎", title:"الحكمة",       desc:"وضع الحجر الأسود في رداء وأمسك به الجميع. صلح الحديبية حين بدا لغيره خسارة.",   hadith:"'الحكمة ضالة المؤمن'" },
  { icon:"🏃", title:"العبادة",      desc:"قام حتى تورّمت قدماه. قالت له عائشة: لِمَ؟ قال: 'أفلا أكون عبداً شكوراً؟'.",    hadith:"'وكان ﷺ يصلي حتى ترم قدماه'" },
  { icon:"👨‍👩‍👧", title:"مع أهله",    desc:"قال: 'خيركم خيركم لأهله وأنا خيركم لأهلي'. كان يخيط ثوبه ويخدم في بيته.",     hadith:"'خيركم خيركم لأهله'" },

// ================================================================
// دوال العرض
// ================================================================

function switchTab(name, btn) {
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("panel-" + name).classList.add("active");
}

// ===== المراحل =====
function buildPhases() {
  const wrap = document.getElementById("phasesContainer");
  wrap.innerHTML = PHASES.map((ph, i) => `
    <div class="phase-card" id="phase${i}">
      <div class="phase-header" onclick="togglePhase(${i})">
        <div class="phase-num">${ph.num}</div>
        <div class="phase-info">
          <div class="phase-title">${ph.title}</div>
          <div class="phase-meta">${ph.meta}</div>
        </div>
        <div class="phase-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
      </div>
      <div class="phase-body">
        <div class="event-list">
          ${ph.events.map(ev => `
            <div class="event-item">
              <div class="event-icon">${ev.icon}</div>
              <div class="event-content">
                <div class="event-title">${ev.title}</div>
                <div class="event-date">📅 ${ev.date}</div>
                <div class="event-desc">${ev.desc}</div>
              </div>
            </div>
          `).join("")}
        </div>
        <div class="seerah-verse">
          ${ph.verse}
          <span>${ph.verseSource}</span>
        </div>
        <div class="phase-lesson">${ph.lesson}</div>
      </div>
    </div>
  `).join("");

  // افتح المرحلة الأولى تلقائياً
  togglePhase(0);
}

function togglePhase(i) {
  const card = document.getElementById("phase" + i);
  card.classList.toggle("open");
}

// ===== الخط الزمني =====
function buildTimeline() {
  const wrap = document.getElementById("timelineContainer");
  wrap.innerHTML = TIMELINE.map((item, i) => `
    <div class="tl-item">
      <div class="tl-left">
        <div class="tl-dot ${item.dot === "green" ? "green" : ""}"></div>
        ${i < TIMELINE.length - 1 ? '<div class="tl-line"></div>' : ""}
      </div>
      <div class="tl-content">
        <div class="tl-year">${item.year}</div>
        <div class="tl-title">${item.title}</div>
        <div class="tl-desc">${item.desc}</div>
      </div>
    </div>
  `).join("");
}

// ===== الغزوات =====
function buildGhazawat() {
  const wrap = document.getElementById("ghazawatContainer");
  wrap.innerHTML = `
    <div style="background:rgba(45,106,79,0.07);border:1px solid rgba(45,106,79,0.15);
                border-radius:16px;padding:16px 20px;margin-bottom:24px;
                display:flex;gap:20px;flex-wrap:wrap;justify-content:center;">
      <div style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:#3fb950;">
        <span style="width:12px;height:12px;border-radius:50%;background:#3fb950;display:inline-block;"></span> نصر
      </div>
      <div style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:#f85149;">
        <span style="width:12px;height:12px;border-radius:50%;background:#f85149;display:inline-block;"></span> هزيمة جزئية
      </div>
      <div style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--gold);">
        <span style="width:12px;height:12px;border-radius:50%;background:var(--gold);display:inline-block;"></span> صلح / بلا قتال
      </div>
    </div>
    ${GHAZAWAT.map(g => `
      <div class="ghazwa-card">
        <div class="ghazwa-header">
          <div class="ghazwa-num">${g.num}</div>
          <div class="ghazwa-title">${g.title}</div>
        </div>
        <div class="ghazwa-year">📅 ${g.year}</div>
        <div class="ghazwa-desc">${g.desc}</div>
        <div class="ghazwa-result result-${g.result}">
          ${g.result === "win" ? "✅" : g.result === "loss" ? "⚠️" : "🤝"} ${g.resultText}
        </div>
      </div>
    `).join("")}
  `;
}

// ===== الأخلاق =====
function buildAkhlaq() {
  const wrap = document.getElementById("akhlaqContainer");
  wrap.innerHTML = AKHLAQ.map(a => `
    <div class="akhlaq-card">
      <span class="akhlaq-icon">${a.icon}</span>
      <div class="akhlaq-title">${a.title}</div>
      <div class="akhlaq-desc">${a.desc}</div>
      <div class="akhlaq-hadith">${a.hadith}</div>
    </div>
  `).join("");
}

// ===== Theme + Menu =====
const themeBtn  = document.getElementById("themeBtn");
const iconSun   = document.getElementById("iconSun");
const iconMoon  = document.getElementById("iconMoon");

(function(){
  const s = localStorage.getItem("theme") || "dark";
  document.documentElement.setAttribute("data-theme", s);
  iconSun.style.display  = s === "dark" ? "none"  : "block";
  iconMoon.style.display = s === "dark" ? "block" : "none";
})();

themeBtn.addEventListener("click", () => {
  const n = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", n);
  localStorage.setItem("theme", n);
  iconSun.style.display  = n === "dark" ? "none"  : "block";
  iconMoon.style.display = n === "dark" ? "block" : "none";
});

const menuToggle  = document.getElementById("menuToggle");
const navMenu     = document.getElementById("navMenu");
const iconMenuEl  = document.getElementById("iconMenu");
const iconCloseEl = document.getElementById("iconClose");

menuToggle.addEventListener("click", () => {
  const open = navMenu.classList.toggle("open");
  menuToggle.setAttribute("aria-expanded", open);
  iconMenuEl.style.display  = open ? "none"  : "block";
  iconCloseEl.style.display = open ? "block" : "none";
});

document.addEventListener("click", (e) => {
  if (!menuToggle.contains(e.target) && !navMenu.contains(e.target)) {
    navMenu.classList.remove("open");
    iconMenuEl.style.display  = "block";
    iconCloseEl.style.display = "none";
  }
});

// ===== تهيئة =====
buildPhases();
buildTimeline();
buildGhazawat();
buildAkhlaq();
</script>
