    .page-hero {

    .gradient-text {

      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .page-hero p {
      font-size: 16px; color: var(--text-sub);

    }
    .hero-stats { display: flex; justify-content: center; gap: 32px; flex-wrap: wrap; position: relative; }
    .hero-stat  { text-align: center; }
    .hero-stat-num { font-size: 2rem; font-weight: 900; color: var(--gold); display: block; }
    .hero-stat-lbl { font-size: 12px; color: var(--text-muted); }

    /* فلاتر */
    .filters-bar {
      max-width: 900px; margin: 32px auto 0;
      padding: 0 24px;
      display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
    }
    .filter-btn {
      padding: 7px 18px; border-radius: 999px;
      background: var(--bg-card); border: 1px solid var(--border);
      color: var(--text-sub); font-family: var(--font);
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: var(--transition);
    }
    .filter-btn:hover, .filter-btn.active {
      background: rgba(45,106,79,0.15);
      border-color: var(--primary); color: var(--primary-light);
    }

    /* بحث */
    .search-wrap {
      max-width: 500px; margin: 20px auto 0;
      padding: 0 24px; position: relative;
    }
    .search-input {
      width: 100%; padding: 12px 20px 12px 44px;
      background: var(--bg-card); border: 1.5px solid var(--border);
      border-radius: 999px; color: var(--text); font-family: var(--font);
      font-size: 14px; outline: none; transition: var(--transition);
    }
    .search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); }
    .search-input::placeholder { color: var(--text-muted); }
    .search-icon {
      position: absolute; left: 38px; top: 50%;
      transform: translateY(-50%); color: var(--text-muted);
      width: 17px; height: 17px; pointer-events: none;
    }

    /* التسلسل الزمني */
    .timeline {
      max-width: 900px; margin: 48px auto 80px;
      padding: 0 24px; position: relative;
    }
    .timeline::before {
      content: '';
      position: absolute; top: 0; bottom: 0;
      right: calc(50% - 1px);
      width: 2px;
      background: linear-gradient(180deg, var(--primary) 0%, var(--gold) 100%);
      opacity: 0.25;
    }

    /* كارد النبي */
    .prophet-card {
      display: grid;
      grid-template-columns: 1fr 48px 1fr;
      gap: 0 16px;
      margin-bottom: 40px;
      position: relative;
    }
    .prophet-card:nth-child(odd)  .prophet-content { grid-column: 1; grid-row: 1; text-align: right; }
    .prophet-card:nth-child(odd)  .prophet-node    { grid-column: 2; grid-row: 1; }
    .prophet-card:nth-child(odd)  .prophet-spacer  { grid-column: 3; grid-row: 1; }
    .prophet-card:nth-child(even) .prophet-spacer  { grid-column: 1; grid-row: 1; }
    .prophet-card:nth-child(even) .prophet-node    { grid-column: 2; grid-row: 1; }
    .prophet-card:nth-child(even) .prophet-content { grid-column: 3; grid-row: 1; text-align: right; }
    .prophet-spacer { display: block; }

    .prophet-node {
      display: flex; flex-direction: column;
      align-items: center; gap: 4px; z-index: 1;
    }
    .prophet-num {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--gold));
      border-radius: 50%; display: flex;
      align-items: center; justify-content: center;
      font-size: 16px; font-weight: 900; color: #fff;
      box-shadow: 0 0 0 4px var(--bg-main), 0 0 0 6px rgba(45,106,79,0.25);
      flex-shrink: 0;
    }
    .prophet-connector { flex: 1; width: 2px; background: var(--border); min-height: 20px; }

    .prophet-content {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px; padding: 20px;
      cursor: pointer; transition: var(--transition);
      position: relative; overflow: hidden;
    }
    .prophet-content::before {
      content: ''; position: absolute; inset: 0; border-radius: 20px;
      background: linear-gradient(135deg, rgba(45,106,79,0.06), transparent);
      opacity: 0; transition: var(--transition);
    }
    .prophet-content:hover {
      border-color: rgba(45,106,79,0.4);
      transform: translateY(-3px);
      box-shadow: var(--shadow-lg);
    }
    .prophet-content:hover::before { opacity: 1; }

    .prophet-icon    { font-size: 2.2rem; margin-bottom: 8px; display: block; }
    .prophet-name    { font-size: 20px; font-weight: 900; margin-bottom: 2px; }
    .prophet-title   { font-size: 12px; color: var(--gold); font-weight: 600; margin-bottom: 8px; }
    .prophet-era     { font-size: 11px; color: var(--text-muted); margin-bottom: 10px; }
    .prophet-summary { font-size: 13.5px; color: var(--text-sub); line-height: 1.7; margin-bottom: 12px; }

    .prophet-tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .prophet-tag {
      background: rgba(45,106,79,0.1);
      border: 1px solid rgba(45,106,79,0.2);
      color: var(--primary-light);
      padding: 3px 10px; border-radius: 999px;
      font-size: 11px; font-weight: 700;
    }
    .read-btn {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 12px; padding: 8px 16px;
      background: linear-gradient(135deg, rgba(45,106,79,0.15), rgba(201,168,76,0.1));
      border: 1px solid rgba(45,106,79,0.3);
      border-radius: 999px; color: var(--primary-light);
      font-size: 13px; font-weight: 700;
      cursor: pointer; transition: var(--transition);
    }
    .read-btn:hover { background: rgba(45,106,79,0.25); }

    /* Modal */
    .story-modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.82);
      z-index: 9998; display: flex;
      align-items: flex-start; justify-content: center;
      padding: 24px 16px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
      overflow-y: auto;
      backdrop-filter: blur(8px);
    }
    .story-modal.open { opacity: 1; pointer-events: all; }
    .story-content {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 24px; padding: 0;
      max-width: 720px; width: 100%;
      transform: scale(0.94); transition: transform 0.3s;
      margin: auto; overflow: hidden;
    }
    .story-modal.open .story-content { transform: scale(1); }
    .story-header {
      background: linear-gradient(135deg, #0d1a0d, #1a1a0d);
      padding: 32px 32px 24px; position: relative;
    }
    .story-close {
      position: absolute; top: 16px; left: 16px;
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,0.1); border: none;
      color: var(--text-sub); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; transition: var(--transition);
    }
    .story-close:hover { background: rgba(255,255,255,0.2); color: var(--text); }
    .story-icon  { font-size: 3rem; display: block; margin-bottom: 12px; }
    .story-name  { font-size: 28px; font-weight: 900; margin-bottom: 4px; }
    .story-sub   { font-size: 14px; color: var(--gold); margin-bottom: 8px; }
    .story-meta  { font-size: 12px; color: var(--text-muted); }
    .story-body  { padding: 28px 32px 32px; }
    .story-section { margin-bottom: 24px; }
    .story-section h3 {
      font-size: 15px; font-weight: 800;
      color: var(--gold); margin-bottom: 10px;
      display: flex; align-items: center; gap: 8px;
    }
    .story-section p { font-size: 14.5px; color: var(--text-sub); line-height: 1.9; }
    .story-verse {
      background: rgba(201,168,76,0.07);
      border-right: 3px solid var(--gold);
      border-radius: 0 10px 10px 0;
      padding: 14px 16px; margin: 12px 0;
      font-size: 16px; font-weight: 700;
      color: var(--gold); line-height: 2;
    }
    .story-verse-source { font-size: 12px; color: var(--text-muted); font-weight: 400; display: block; margin-top: 4px; }
    .story-lessons { display: grid; gap: 8px; margin-top: 10px; }
    .story-lesson {
      display: flex; gap: 10px; align-items: flex-start;
      background: rgba(45,106,79,0.07);
      border-radius: 10px; padding: 10px 14px;
      font-size: 13.5px; color: var(--text-sub);
    }
    .story-lesson::before { content: '✦'; color: var(--primary-light); flex-shrink: 0; margin-top: 2px; }
    .story-source {
      font-size: 12px; color: var(--text-muted);
      padding-top: 16px; border-top: 1px solid var(--border);
      margin-top: 24px;
    }

    /* Responsive */
    @media (max-width: 640px) {
      .timeline::before { right: 24px; }
      .prophet-card { grid-template-columns: 48px 1fr; }
      .prophet-card:nth-child(odd)  .prophet-content,
      .prophet-card:nth-child(even) .prophet-content { grid-column: 2; grid-row: 1; text-align: right; }
      .prophet-card:nth-child(odd)  .prophet-node,
      .prophet-card:nth-child(even) .prophet-node    { grid-column: 1; grid-row: 1; }
      .prophet-spacer { display: none; }
      .story-body   { padding: 20px; }
      .story-header { padding: 24px 20px 20px; }
    }
  </style>
</head>

const PROPHETS = [
  {
    id:1, name:"آدم", title:"عليه السلام — أبو البشر",
    icon:"🌿", era:"بداية الخليقة",
    category:["all"],
    tags:["أول الأنبياء","الجنة والأرض","التوبة"],
    summary:"أول إنسان خلقه الله من طين، أسجد له الملائكة، أُسكن الجنة ثم نزل إلى الأرض، وعلّمه الله الأسماء كلها.",
    full:{
      born:"خُلق من طين الأرض — أول مخلوق بشري",

      lessons:["التوبة والرجوع إلى الله باب مفتوح دائماً","الكبر والاستعلاء سبب الهلاك — إبليس مثال دائم","الاستخلاف في الأرض مسؤولية عظيمة","معصية آدم علّمتنا فطرة التوبة والإنابة"],
      source:"البداية والنهاية — ابن كثير، ج1"
    }
  },
  {

// ================================================================
// دوال العرض
// ================================================================

let currentFilter = "all";
let allCards = [];

function renderProphets(list) {
  const timeline = document.getElementById("timeline");
  timeline.innerHTML = "";
  if (!list.length) {
    timeline.innerHTML = `<div style="text-align:center;padding:60px;color:var(--text-muted);">لا توجد نتائج</div>`;
    return;
  }
  list.forEach((p, i) => {
    const div = document.createElement("div");
    div.className = "prophet-card";
    div.setAttribute("role","listitem");
    div.dataset.category = p.category.join(" ");
    div.innerHTML = `
      <div class="prophet-content" onclick="openStory(${p.id - 1})" tabindex="0"
           onkeydown="if(event.key==='Enter')openStory(${p.id - 1})">
        <span class="prophet-icon">${p.icon}</span>
        <div class="prophet-name">${p.name} <span style="font-size:13px;color:var(--text-muted);font-weight:400;">عليه السلام</span></div>
        <div class="prophet-title">${p.title}</div>
        <div class="prophet-era">⏳ ${p.era}</div>
        <div class="prophet-summary">${p.summary}</div>
        <div class="prophet-tags">${p.tags.map(t=>`<span class="prophet-tag">${t}</span>`).join("")}</div>
        <button class="read-btn" onclick="event.stopPropagation();openStory(${p.id - 1})">
          اقرأ القصة كاملة
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
      </div>
      <div class="prophet-node">
        <div class="prophet-num">${p.id}</div>
        <div class="prophet-connector"></div>
      </div>
      <div class="prophet-spacer"></div>
    `;
    timeline.appendChild(div);
  });
  allCards = document.querySelectorAll(".prophet-card");
}

function filterProphets(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  const filtered = cat === "all" ? PROPHETS : PROPHETS.filter(p => p.category.includes(cat));
  renderProphets(filtered);
}

function searchProphets(q) {
  const val = q.trim().toLowerCase();
  const base = currentFilter === "all" ? PROPHETS : PROPHETS.filter(p => p.category.includes(currentFilter));
  if (!val) { renderProphets(base); return; }
  const filtered = base.filter(p =>
    p.name.includes(q) ||
    p.title.includes(q) ||
    p.summary.includes(q) ||
    p.tags.some(t => t.includes(q))
  );
  renderProphets(filtered);
}

function openStory(index) {
  const p = PROPHETS[index];
  if (!p) return;
  document.getElementById("storyIcon").textContent = p.icon;
  document.getElementById("storyName").textContent = p.name + " عليه السلام";
  document.getElementById("storySub").textContent  = p.full.mission;
  document.getElementById("storyMeta").textContent = "⏳ " + p.era;
  document.getElementById("storyBody").innerHTML = `
    <div class="story-section">
      <h3>📍 المولد والنشأة</h3>
      <p>${p.full.born}</p>
    </div>
    <div class="story-section">
      <h3>📖 القصة</h3>
      <p style="white-space:pre-line;">${p.full.story}</p>
    </div>
    <div class="story-verse">
      ${p.full.verse}
      <span class="story-verse-source">${p.full.verseSource}</span>
    </div>
    <div class="story-section">
      <h3>💡 الدروس والعبر</h3>
      <div class="story-lessons">
        ${p.full.lessons.map(l => `<div class="story-lesson">${l}</div>`).join("")}
      </div>
    </div>
    <div class="story-section">
      <div class="prophet-tags" style="margin-top:8px;">
        ${p.tags.map(t => `<span class="prophet-tag">${t}</span>`).join("")}
      </div>
    </div>
    <div class="story-source">📚 المصدر: ${p.full.source}</div>
  `;
  const modal = document.getElementById("storyModal");
  modal.classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeStory() {
  document.getElementById("storyModal").classList.remove("open");
  document.body.style.overflow = "";
}

// إغلاق المودال بالنقر خارجه
document.getElementById("storyModal").addEventListener("click", function(e) {
  if (e.target === this) closeStory();
});

// إغلاق بـ Escape
document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeStory();
});

// ================================================================
// Theme
// ================================================================
const themeBtn  = document.getElementById("themeBtn");
const iconSun   = document.getElementById("iconSun");
const iconMoon  = document.getElementById("iconMoon");

(function(){
  const s = localStorage.getItem("theme") || "dark";
  document.documentElement.setAttribute("data-theme", s);
  iconSun.style.display  = s === "dark" ? "none"  : "block";
  iconMoon.style.display = s === "dark" ? "block" : "none";
})();

themeBtn.addEventListener("click", () => {
  const n = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", n);
  localStorage.setItem("theme", n);
  iconSun.style.display  = n === "dark" ? "none"  : "block";
  iconMoon.style.display = n === "dark" ? "block" : "none";
});

// ================================================================
// Menu Toggle
// ================================================================
const menuToggle  = document.getElementById("menuToggle");
const navMenu     = document.getElementById("navMenu");
const iconMenuEl  = document.getElementById("iconMenu");
const iconCloseEl = document.getElementById("iconClose");

menuToggle.addEventListener("click", () => {
  const open = navMenu.classList.toggle("open");
  menuToggle.setAttribute("aria-expanded", open);
  iconMenuEl.style.display  = open ? "none"  : "block";
  iconCloseEl.style.display = open ? "block" : "none";
});

document.addEventListener("click", (e) => {
  if (!menuToggle.contains(e.target) && !navMenu.contains(e.target)) {
    navMenu.classList.remove("open");
    iconMenuEl.style.display  = "block";
    iconCloseEl.style.display = "none";
  }
});

// ================================================================
// Firebase — حالة تسجيل الدخول
// ================================================================
window.addEventListener("islamiCalcReady", () => {
  const user = window.islamiCalc?.getCurrentUser?.();
  if (user) {
    document.getElementById("loginBtn").style.display   = "none";
    document.getElementById("navProfile").style.display = "block";
  }
});

// ================================================================
// تهيئة
// ================================================================
