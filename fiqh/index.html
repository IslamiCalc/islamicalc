<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أسئلة وأجوبة فقهية — IslamiCalc</title>
<meta name="description" content="أسئلة وأجوبة فقهية مختصرة تساعد على فهم المسائل الأساسية والرجوع للمصادر الموثوقة.">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">
<script type="module" src="/core/firebase.js"></script>
<script type="module" src="/core/app.js"></script>
</head>
<body>
<nav class="navbar">
  <a href="/" class="navbar-brand">
    <div class="navbar-logo">☪</div>
    <span class="navbar-title">IslamiCalc</span>
  </a>
  <ul class="navbar-menu" id="navMenu">
    <li><a href="/">الرئيسية</a></li>
    <li><a href="/zakat/">الزكاة</a></li>
    <li><a href="/khatma/">الختمة</a></li>
    <li><a href="/prayer/">الصلاة</a></li>
    <li><a href="/athkar/">الأذكار</a></li>
    <li><a href="/arena/">الأرينا</a></li>
    <li id="navProfile" style="display:none;"><a href="/profile">بروفايلي</a></li>
  </ul>
  <div class="navbar-actions">
    <button class="theme-btn" id="themeBtn" aria-label="تبديل الثيم">🌙</button>
    <button class="login-btn" id="loginBtn" onclick="window.islamiCalc?.loginWithGoogle()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
      </svg>
      دخول
    </button>
    <button class="menu-toggle" id="menuToggle" aria-label="القائمة">☰</button>
  </div>
</nav>
<main style="min-height:80vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;">
  <div style="text-align:center;max-width:480px;">
    <div style="font-size:80px;margin-bottom:24px;">⚖️</div>
    <h1 style="font-size:28px;font-weight:900;margin-bottom:12px;color:var(--gold);">أسئلة وأجوبة فقهية</h1>
    <p style="font-size:16px;color:var(--text-secondary);line-height:1.8;margin-bottom:32px;">
      هذه الصفحة قيد التطوير وستكون متاحة قريباً بإذن الله ✨
    </p>
    <a href="/" style="display:inline-block;background:linear-gradient(135deg,var(--gold),#fbbf24);color:#0a0f1e;border-radius:14px;padding:14px 32px;font-family:Cairo,sans-serif;font-size:16px;font-weight:900;text-decoration:none;">
      ← العودة للرئيسية
    </a>
  </div>
</main>
<script>
const menuToggle = document.getElementById("menuToggle");
const navMenu    = document.getElementById("navMenu");

menuToggle.addEventListener("click", () => {
  navMenu.classList.toggle("open");
});

document.addEventListener("click", (e) => {
  if (!menuToggle.contains(e.target) && !navMenu.contains(e.target)) {
    navMenu.classList.remove("open");
  }
});

window.addEventListener("islamiCalcReady", () => {
  const user = window.islamiCalc?.getCurrentUser?.();
  if (user) {
    document.getElementById("loginBtn").style.display   = "none";
    document.getElementById("navProfile").style.display = "block";
  }
});
</script>
</body>
</html>
