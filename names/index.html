<!DOCTYPE html>

<style>
.name-card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:16px;cursor:pointer;transition:.22s;}
.name-card:hover{border-color:var(--gold);transform:translateY(-2px);}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:800;}
.badge-loved{background:rgba(16,185,129,0.15);color:#10b981;}
.badge-allowed{background:rgba(100,116,139,0.15);color:#94a3b8;}
.badge-makruh{background:rgba(245,158,11,0.15);color:#f59e0b;}
.badge-haram{background:rgba(239,68,68,0.15);color:#ef4444;}
.filter-btn{background:var(--bg-main);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font-arabic);color:var(--text-muted);transition:.2s;white-space:nowrap;}
.filter-btn.active,.filter-btn:hover{background:var(--gold);border-color:var(--gold);color:#000;}
.letter-btn{background:var(--bg-main);border:1px solid var(--border);border-radius:8px;padding:5px 8px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font-arabic);color:var(--text-muted);transition:.2s;min-width:34px;text-align:center;}
.letter-btn.active,.letter-btn:hover{background:var(--primary);border-color:var(--primary);color:white;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal-box{background:var(--bg-card);border:1px solid var(--border);border-radius:20px;padding:26px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto;}
.fav-btn{background:none;border:none;font-size:22px;cursor:pointer;transition:.2s;}
</style></head><body>
<nav class="navbar">
  <a href="../index.html" class="navbar-brand"><div class="navbar-logo">☪</div><span class="navbar-title">IslamiCalc</span></a>
  <div class="navbar-actions"><button class="theme-btn" id="themeBtn">🌙</button></div>
</nav>

    <h1 style="font-size:24px;font-weight:900;">الأسماء الإسلامية</h1>
    <p style="color:var(--text-muted);font-size:13px;" id="countLabel">120 اسم • معاني وأحكام شرعية</p>
  </div>

  <!-- بحث -->
  <input type="text" id="searchName" class="form-input" placeholder="🔍 ابحث بالاسم أو المعنى..." oninput="render()" style="margin-bottom:12px;">

  <!-- فلاتر -->
  <div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:12px;scrollbar-width:none;">
    <button class="filter-btn active" data-f="all" onclick="setFilter(this)">الكل</button>
    <button class="filter-btn" data-f="male" onclick="setFilter(this)">👦 ذكور</button>
    <button class="filter-btn" data-f="female" onclick="setFilter(this)">👧 إناث</button>
    <button class="filter-btn" data-f="prophet" onclick="setFilter(this)">🕊️ أنبياء</button>
    <button class="filter-btn" data-f="sahabi" onclick="setFilter(this)">⭐ صحابة</button>
    <button class="filter-btn" data-f="loved" onclick="setFilter(this)">💚 محبوبة</button>
    <button class="filter-btn" data-f="makruh" onclick="setFilter(this)">⚠️ مكروهة</button>
    <button class="filter-btn" data-f="favs" onclick="setFilter(this)">💛 مفضلاتي</button>
  </div>

  <!-- حروف -->
  <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px;" id="letterGrid"></div>

  <!-- شبكة الأسماء -->
  <div id="namesGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;"></div>
  <p id="emptyMsg" style="text-align:center;color:var(--text-muted);padding:40px;display:none;">لا توجد نتائج 🔍</p>
</div></main>

const LETTERS=["أ","ب","ت","ث","ج","ح","خ","د","ذ","ر","ز","س","ش","ص","ض","ط","ظ","ع","غ","ف","ق","ك","ل","م","ن","ه","و","ي"];
let curFilter="all", curLetter="", favs=JSON.parse(localStorage.getItem("nameFavs")||"[]");

function buildLetters(){
  const used=new Set(NAMES.map(n=>n.n[0]));
  document.getElementById("letterGrid").innerHTML=
    `<button class="letter-btn active" data-l="" onclick="setLetter(this)">الكل</button>`+
    LETTERS.filter(l=>used.has(l)||[...used].some(u=>u===l)).map(l=>
      `<button class="letter-btn" data-l="${l}" onclick="setLetter(this)">${l}</button>`).join("");
}
function setLetter(el){
  document.querySelectorAll(".letter-btn").forEach(b=>b.classList.remove("active"));el.classList.add("active");
  curLetter=el.dataset.l;render();
}
function setFilter(el){
  document.querySelectorAll("[data-f]").forEach(b=>b.classList.remove("active"));el.classList.add("active");
  curFilter=el.dataset.f;render();
}
function toggleFav(id,e){
  e.stopPropagation();
  if(favs.includes(id)) favs=favs.filter(f=>f!==id);
  else favs.push(id);
  localStorage.setItem("nameFavs",JSON.stringify(favs));
  render();showToast(favs.includes(id)?"💛 أُضيف للمفضلة":"تم الإزالة من المفضلة");
}
const BADGE={loved:"badge-loved",allowed:"badge-allowed",makruh:"badge-makruh",haram:"badge-haram"};
const BADGE_TXT={loved:"✅ محبوب",allowed:"⚪ مباح",makruh:"⚠️ مكروه",haram:"🚫 محرّم"};
const COLOR={loved:"#10b981",allowed:"#94a3b8",makruh:"#f59e0b",haram:"#ef4444"};

function render(){
  const q=(document.getElementById("searchName").value||"").trim();
  let list=NAMES.filter(n=>{
    if(curFilter==="male") return n.g==="male";
    if(curFilter==="female") return n.g==="female";
    if(curFilter==="prophet") return n.tags.includes("prophet");
    if(curFilter==="sahabi") return n.tags.includes("sahabi");
    if(curFilter==="loved") return n.r==="loved";
    if(curFilter==="makruh") return n.r==="makruh"||n.r==="haram";
    if(curFilter==="favs") return favs.includes(n.id);
    return true;
  });
  if(curLetter) list=list.filter(n=>n.n[0]===curLetter||n.n.startsWith(curLetter));
  if(q) list=list.filter(n=>n.n.includes(q)||n.m.includes(q));
  document.getElementById("countLabel").textContent=`${list.length} اسم • معاني وأحكام شرعية`;
  document.getElementById("emptyMsg").style.display=list.length?"none":"block";
  document.getElementById("namesGrid").innerHTML=list.map(n=>`
    <div class="name-card" onclick="openName('${n.id}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;">
        <p style="font-size:18px;font-weight:900;">${n.n}</p>
        <button class="fav-btn" onclick="toggleFav('${n.id}',event)">${favs.includes(n.id)?"💛":"🤍"}</button>
      </div>
      <p style="font-size:12px;color:var(--text-muted);margin-bottom:8px;">${n.m}</p>
      <span class="badge ${BADGE[n.r]}">${BADGE_TXT[n.r]}</span>
    </div>`).join("");
}
function openName(id){
  const n=NAMES.find(x=>x.id===id);
  document.getElementById("modalContent").innerHTML=`
    <div style="text-align:center;margin-bottom:18px;">
      <p style="font-size:42px;font-weight:900;margin-bottom:6px;">${n.n}</p>
      <p style="color:var(--text-muted);font-size:14px;">${n.g==="male"?"👦 اسم ذكر":"👧 اسم أنثى"}</p>
    </div>
    <div style="background:var(--bg-main);border-radius:12px;padding:14px;margin-bottom:12px;">
      <p style="font-size:13px;font-weight:700;color:var(--text-muted);margin-bottom:4px;">المعنى</p>
      <p style="font-size:16px;font-weight:800;">${n.m}</p>
    </div>
    <div style="background:var(--bg-main);border-radius:12px;padding:14px;margin-bottom:12px;">
      <p style="font-size:13px;font-weight:700;color:var(--text-muted);margin-bottom:6px;">الحكم الشرعي</p>
      <span class="badge ${BADGE[n.r]}" style="font-size:14px;padding:6px 16px;">${BADGE_TXT[n.r]}</span>
      ${n.note?`<p style="font-size:13px;color:var(--text-secondary);margin-top:10px;line-height:1.8;">${n.note}</p>`:""}
    </div>
    ${n.tags.length?`<div style="display:flex;gap:6px;flex-wrap:wrap;">
      ${n.tags.map(t=>`<span style="background:rgba(99,102,241,0.1);color:var(--primary-light);border:1px solid rgba(99,102,241,0.2);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700;">${t==="prophet"?"🕊️ نبي":t==="sahabi"?"⭐ صحابي":t}</span>`).join("")}
    </div>`:""}
    <button onclick="toggleFav('${n.id}',{stopPropagation:()=>{}})" class="btn btn-primary" style="width:100%;margin-top:14px;">
      ${favs.includes(n.id)?"💛 في المفضلة — اضغط للإزالة":"🤍 أضف للمفضلة"}
    </button>`;
  document.getElementById("modal").style.display="flex";
}
function closeModal(e){if(e.target===document.getElementById("modal"))document.getElementById("modal").style.display="none";}

buildLetters();render();
</script></body></html>
