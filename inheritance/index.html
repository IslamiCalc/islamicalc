<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>حاسبة الميراث | IslamiCalc</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">
<style>
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:18px;padding:22px;margin-bottom:14px;}
.heir-row{display:flex;align-items:center;gap:10px;background:var(--bg-main);border-radius:12px;padding:12px;margin-bottom:8px;}
.calc-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;}
.calc-row:last-child{border-bottom:none;}
.share-bar{height:8px;border-radius:30px;background:linear-gradient(90deg,var(--gold),#f97316);margin-top:4px;}
.hadith-box{background:rgba(245,158,11,0.06);border-right:3px solid var(--gold);padding:12px 14px;border-radius:0 10px 10px 0;margin:10px 0;}
</style></head><body>
<nav class="navbar">
  <a href="../index.html" class="navbar-brand"><div class="navbar-logo">☪</div><span class="navbar-title">IslamiCalc</span></a>
  <div class="navbar-actions"><button class="theme-btn" id="themeBtn">🌙</button></div>
</nav>
<main><div style="max-width:660px;margin:0 auto;padding:24px 16px 80px;">
  <div style="text-align:center;padding:20px 0 14px;">
    <div style="font-size:52px;margin-bottom:8px;">⚖️</div>
    <h1 style="font-size:24px;font-weight:900;">حاسبة الميراث</h1>
    <p style="color:var(--text-muted);font-size:13px;">توزيع التركة وفق الفرائض الشرعية</p>
  </div>
  <div class="hadith-box"><p style="font-size:13px;color:var(--gold);">«تعلموا الفرائض وعلّموها، فإنها نصف العلم» — رواه ابن ماجه</p></div>

  <!-- التركة -->
  <div class="card">
    <h2 style="font-size:15px;font-weight:900;margin-bottom:12px;">💰 قيمة التركة</h2>
    <input type="number" id="estate" class="form-input" placeholder="أدخل قيمة التركة (ريال)" oninput="calcInheritance()">
    <p style="font-size:12px;color:var(--text-muted);margin-top:6px;">💡 تُخصم الديون والوصية (حتى الثلث) قبل التوزيع</p>
  </div>

  <!-- الورثة -->
  <div class="card">
    <h2 style="font-size:15px;font-weight:900;margin-bottom:12px;">👥 الورثة</h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div class="heir-row" style="flex-direction:column;align-items:flex-start;">
        <label style="font-size:12px;font-weight:700;color:var(--text-muted);">👨 الزوج</label>
        <select id="husband" class="form-select" style="margin-top:4px;" onchange="calcInheritance()">
          <option value="0">لا يوجد</option><option value="1">موجود</option>
        </select>
      </div>
      <div class="heir-row" style="flex-direction:column;align-items:flex-start;">
        <label style="font-size:12px;font-weight:700;color:var(--text-muted);">👩 الزوجة</label>
        <select id="wife" class="form-select" style="margin-top:4px;" onchange="calcInheritance()">
          <option value="0">لا توجد</option><option value="1">واحدة</option>
          <option value="2">اثنتان</option><option value="3">ثلاث</option><option value="4">أربع</option>
        </select>
      </div>
      <div class="heir-row" style="flex-direction:column;align-items:flex-start;">
        <label style="font-size:12px;font-weight:700;color:var(--text-muted);">👨‍👦 الأبناء الذكور</label>
        <input type="number" id="sons" class="form-input" value="0" min="0" style="margin-top:4px;" oninput="calcInheritance()">
      </div>
      <div class="heir-row" style="flex-direction:column;align-items:flex-start;">
        <label style="font-size:12px;font-weight:700;color:var(--text-muted);">👧 الأبناء الإناث</label>
        <input type="number" id="daughters" class="form-input" value="0" min="0" style="margin-top:4px;" oninput="calcInheritance()">
      </div>
      <div class="heir-row" style="flex-direction:column;align-items:flex-start;">
        <label style="font-size:12px;font-weight:700;color:var(--text-muted);">👴 الأب</label>
        <select id="father" class="form-select" style="margin-top:4px;" onchange="calcInheritance()">
          <option value="0">لا يوجد</option><option value="1">موجود</option>
        </select>
      </div>
      <div class="heir-row" style="flex-direction:column;align-items:flex-start;">
        <label style="font-size:12px;font-weight:700;color:var(--text-muted);">👵 الأم</label>
        <select id="mother" class="form-select" style="margin-top:4px;" onchange="calcInheritance()">
          <option value="0">لا توجد</option><option value="1">موجودة</option>
        </select>
      </div>
      <div class="heir-row" style="flex-direction:column;align-items:flex-start;">
        <label style="font-size:12px;font-weight:700;color:var(--text-muted);">👨‍👦‍👦 الأخوة الأشقاء</label>
        <input type="number" id="brothers" class="form-input" value="0" min="0" style="margin-top:4px;" oninput="calcInheritance()">
      </div>
      <div class="heir-row" style="flex-direction:column;align-items:flex-start;">
        <label style="font-size:12px;font-weight:700;color:var(--text-muted);">👭 الأخوات الشقيقات</label>
        <input type="number" id="sisters" class="form-input" value="0" min="0" style="margin-top:4px;" oninput="calcInheritance()">
      </div>
    </div>
  </div>

  <!-- النتائج -->
  <div class="card" id="resultCard" style="display:none;">
    <h2 style="font-size:15px;font-weight:900;margin-bottom:14px;">📊 نتيجة التوزيع</h2>
    <div id="resultContent"></div>
  </div>

  <!-- معلومات -->
  <div class="card">
    <h2 style="font-size:15px;font-weight:900;margin-bottom:12px;">📚 الفروض المقدّرة</h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;" id="faradList"></div>
  </div>
</div></main>
<div class="toast" id="toast"></div>
<script>
const themeBtn=document.getElementById("themeBtn");
const htmlEl=document.documentElement;
(function(){const s=localStorage.getItem("theme")||"dark";htmlEl.setAttribute("data-theme",s);themeBtn.textContent=s==="dark"?"☀️":"🌙";})();
themeBtn.addEventListener("click",()=>{const n=htmlEl.getAttribute("data-theme")==="dark"?"light":"dark";htmlEl.setAttribute("data-theme",n);localStorage.setItem("theme",n);themeBtn.textContent=n==="dark"?"☀️":"🌙";});

const COLORS=["#f59e0b","#6366f1","#10b981","#f97316","#ec4899","#14b8a6","#8b5cf6","#ef4444"];

function calcInheritance(){
  const estate=parseFloat(document.getElementById("estate").value)||0;
  const husband=parseInt(document.getElementById("husband").value)||0;
  const wifeCnt=parseInt(document.getElementById("wife").value)||0;
  const sons=parseInt(document.getElementById("sons").value)||0;
  const daughters=parseInt(document.getElementById("daughters").value)||0;
  const father=parseInt(document.getElementById("father").value)||0;
  const mother=parseInt(document.getElementById("mother").value)||0;
  const brothers=parseInt(document.getElementById("brothers").value)||0;
  const sisters=parseInt(document.getElementById("sisters").value)||0;

  const hasChildren = sons>0||daughters>0;
  let shares=[];
  let total=0;
  const LCM=12; // نسطة مشتركة

  // ─── حساب الفروض (مبسّط) ───
  let husbandShare=0, wifeShare=0, fatherShare=0, motherShare=0;
  let childrenPool=0;

  // الزوج: مع أولاد 1/4 ، بدون أولاد 1/2
  if(husband) husbandShare = hasChildren ? 0.25 : 0.5;

  // الزوجة: مع أولاد 1/8 ، بدون أولاد 1/4 (تُقسّم على عدد الزوجات)
  if(wifeCnt) wifeShare = hasChildren ? 0.125 : 0.25;

  // الأب: مع أولاد ذكور → 1/6 فقط ، مع بنات فقط → 1/6 + تعصيب ، بدون أولاد → تعصيب
  if(father) fatherShare = hasChildren ? (1/6) : 0;

  // الأم: مع أولاد → 1/6 ، بدون أولاد → 1/3
  if(mother) motherShare = hasChildren ? (1/6) : (brothers+sisters>=2 ? 1/6 : 1/3);

  let fixed = husbandShare + wifeShare + fatherShare + motherShare;
  let remaining = Math.max(0, 1 - fixed);

  // أولاد: للذكر مثل حظ الأنثيين
  const maleParts = sons * 2 + daughters;
  childrenPool = (sons>0||daughters>0) ? remaining : 0;

  // أب تعصيب بلا أولاد
  let fatherExtra = 0;
  if(father && !hasChildren) fatherExtra = remaining;

  // أخوة: تعصيب بلا أولاد وبلا أب
  let brotherPool = (!hasChildren && !father && (brothers+sisters>0)) ? remaining : 0;

  let rows=[];
  if(husband && estate){
    const amt=(estate*husbandShare);
    rows.push({n:"الزوج",pct:husbandShare*100,amt,icon:"👨"});
  }
  if(wifeCnt && estate){
    const totalW=estate*wifeShare;
    const perWife=totalW/wifeCnt;
    rows.push({n:`الزوجات (${wifeCnt})`,pct:wifeShare*100,amt:totalW,icon:"👩",note:`كل واحدة: ${fmtNum(perWife)}`});
  }
  if(father && estate){
    const amt=estate*(fatherShare+(fatherExtra));
    rows.push({n:"الأب",pct:(fatherShare+fatherExtra)*100,amt,icon:"👴"});
  }
  if(mother && estate){
    const amt=estate*motherShare;
    rows.push({n:"الأم",pct:motherShare*100,amt,icon:"👵"});
  }
  if((sons>0||daughters>0) && estate){
    const maleParts=sons*2+daughters;
    const perMalePart=estate*childrenPool/maleParts;
    if(sons>0){
      const sAmt=perMalePart*2*sons;
      rows.push({n:`الأبناء (${sons})`,pct:(sAmt/estate*100),amt:sAmt,icon:"👦",note:`كل ابن: ${fmtNum(perMalePart*2)}`});
    }
    if(daughters>0){
      const dAmt=perMalePart*daughters;
      rows.push({n:`البنات (${daughters})`,pct:(dAmt/estate*100),amt:dAmt,icon:"👧",note:`كل بنت: ${fmtNum(perMalePart)}`});
    }
  }
  if(brotherPool>0 && (brothers+sisters)>0 && estate){
    const mParts=brothers*2+sisters;
    const perMP=estate*brotherPool/mParts;
    if(brothers>0) rows.push({n:`الأخوة (${brothers})`,pct:(perMP*2*brothers/estate*100),amt:perMP*2*brothers,icon:"👨‍👦"});
    if(sisters>0) rows.push({n:`الأخوات (${sisters})`,pct:(perMP*sisters/estate*100),amt:perMP*sisters,icon:"👭"});
  }

  if(!estate||rows.length===0){document.getElementById("resultCard").style.display="none";return;}
  document.getElementById("resultCard").style.display="block";

  const totalDist=rows.reduce((s,r)=>s+r.amt,0);
  document.getElementById("resultContent").innerHTML=`
    <div style="background:linear-gradient(135deg,#1e1b4b,#312e81);border-radius:14px;padding:16px;text-align:center;margin-bottom:14px;">
      <p style="color:rgba(255,255,255,0.6);font-size:12px;">التركة الكلية</p>
      <p style="font-size:28px;font-weight:900;color:white;">${fmtNum(estate)} ريال</p>
    </div>
    ${rows.map((r,i)=>`
      <div style="background:var(--bg-main);border-radius:12px;padding:14px;margin-bottom:8px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
          <span style="font-size:14px;font-weight:800;">${r.icon} ${r.n}</span>
          <span style="font-size:16px;font-weight:900;color:${COLORS[i%COLORS.length]};">${fmtNum(r.amt)} ريال</span>
        </div>
        ${r.note?`<p style="font-size:12px;color:var(--text-muted);margin-bottom:4px;">${r.note}</p>`:""}
        <div style="background:var(--border);border-radius:30px;height:6px;">
          <div style="width:${Math.min(r.pct,100)}%;height:100%;border-radius:30px;background:${COLORS[i%COLORS.length]};"></div>
        </div>
        <p style="font-size:11px;color:var(--text-muted);margin-top:3px;">${r.pct.toFixed(1)}%</p>
      </div>`).join("")}
    <div style="background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);border-radius:10px;padding:10px;text-align:center;margin-top:8px;">
      <p style="font-size:13px;font-weight:800;color:#10b981;">✅ الموزَّع: ${fmtNum(totalDist)} ريال</p>
    </div>
    <p style="font-size:11px;color:var(--text-muted);text-align:center;margin-top:8px;">📚 هذه الحاسبة للإرشاد — راجع عالماً متخصصاً</p>`;
}

function fmtNum(n){return n.toLocaleString("ar-SA",{minimumFractionDigits:0,maximumFractionDigits:0});}

// الفروض المقدّرة
const FARAD=[
  {f:"1/2",h:"البنت المنفردة، الزوج بلا أولاد، الأخت الشقيقة المنفردة"},
  {f:"1/4",h:"الزوج مع الأولاد، الزوجة بلا أولاد"},
  {f:"1/8",h:"الزوجة مع الأولاد (تُقسّم بين الزوجات)"},
  {f:"1/3",h:"الأم بلا أولاد وأقل من أخوين، الأخوان لأم فأكثر"},
  {f:"1/6",h:"الأب أو الأم مع الأولاد، الجد أحياناً"},
  {f:"2/3",h:"البنتان فأكثر، الأختان الشقيقتان فأكثر"},
];
document.getElementById("faradList").innerHTML=FARAD.map(f=>`
  <div style="background:var(--bg-main);border-radius:12px;padding:12px;">
    <p style="font-size:22px;font-weight:900;color:var(--gold);">${f.f}</p>
    <p style="font-size:11px;color:var(--text-muted);margin-top:4px;line-height:1.6;">${f.h}</p>
  </div>`).join("");
</script></body></html>
